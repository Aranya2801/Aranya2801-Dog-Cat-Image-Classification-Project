version: '3.9'

services:
  # ── DogCat Vision API ────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: dogcat-vision:latest
    container_name: dogcat-api
    ports:
      - "8000:8000"
    volumes:
      - ../checkpoints:/app/checkpoints:ro
      - ../data/sample:/app/data/sample:ro
      - uploads:/app/uploads
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MLflow Tracking Server ───────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: dogcat-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --default-artifact-root /mlflow/artifacts
      --backend-store-uri sqlite:////mlflow/mlflow.db
    restart: unless-stopped

volumes:
  uploads:
  mlflow_data:
