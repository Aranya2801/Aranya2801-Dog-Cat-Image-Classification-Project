# ================================================================
# DogCat Vision — EfficientNet-B4 Training Configuration
# ================================================================
# Usage: python src/train.py --config configs/efficientnet_b4.yaml

# ── Model ────────────────────────────────────────────────────────
model_name: efficientnet_b4
pretrained: true
dropout_rate: 0.4
num_classes: 2
freeze_backbone: false    # Start unfrozen; phase logic in Trainer

# ── Training ─────────────────────────────────────────────────────
epochs: 20
batch_size: 32
learning_rate: 0.0001
weight_decay: 0.00001
warmup_epochs: 3
gradient_clip_norm: 1.0

# ── Data ─────────────────────────────────────────────────────────
data_dir: data/processed
input_size: 380          # EfficientNet-B4 native resolution
num_workers: 4

# ── Augmentation ─────────────────────────────────────────────────
use_mixup: true
mixup_alpha: 0.4
label_smoothing: 0.1

# ── Checkpointing ────────────────────────────────────────────────
checkpoint_dir: checkpoints
save_every_n_epochs: 5

# ── Early Stopping ───────────────────────────────────────────────
early_stopping_patience: 7

# ── Logging ──────────────────────────────────────────────────────
mlflow_experiment: dogcat-vision
tensorboard_dir: runs

# ── Device ───────────────────────────────────────────────────────
device: cuda          # Automatically falls back to cpu if no GPU
mixed_precision: true
