name: 🐾 DogCat Vision CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Format Check ───────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install ruff black isort mypy

      - name: Run Ruff (linter)
        run: ruff check src/ tests/

      - name: Run Black (formatter check)
        run: black --check src/ tests/

      - name: Run isort (import sort check)
        run: isort --check-only src/ tests/

  # ── Unit Tests ────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  # ── Docker Build ──────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: dogcat-vision:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Model Validation ──────────────────────────────────────────
  model-check:
    name: 🧠 Model Architecture Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install torch torchvision timm

      - name: Verify model loads
        run: |
          python -c "
          from src.models.efficientnet import DogCatClassifier
          import torch
          model = DogCatClassifier(pretrained=False)
          dummy = torch.randn(1, 3, 380, 380)
          out = model(dummy)
          assert out.shape == (1, 2), f'Expected (1,2), got {out.shape}'
          print('✅ Model architecture verified:', model.count_parameters(), 'trainable params')
          "
