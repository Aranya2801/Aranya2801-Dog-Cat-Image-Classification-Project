<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070b14"/>
      <stop offset="100%" style="stop-color:#0d1421"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f97316" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <rect width="900" height="200" fill="url(#glow1)" rx="12"/>
  <rect width="900" height="200" fill="url(#glow2)" rx="12"/>

  <!-- Border -->
  <rect width="900" height="200" fill="none" stroke="#1f2d4a" stroke-width="1.5" rx="12"/>

  <!-- Icon circle -->
  <circle cx="80" cy="100" r="46" fill="#111827" stroke="#1f2d4a" stroke-width="1.5"/>
  <text x="80" y="115" text-anchor="middle" font-size="42">🐾</text>

  <!-- Title -->
  <text x="148" y="82" font-size="36" font-weight="700" fill="url(#titleGrad)" letter-spacing="-1">DogCat Vision</text>

  <!-- Subtitle -->
  <text x="148" y="110" font-size="14" fill="#64748b" font-weight="400">Advanced Image Classification System</text>

  <!-- Divider line -->
  <line x1="148" y1="122" x2="560" y2="122" stroke="#1f2d4a" stroke-width="1"/>

  <!-- Badges row -->
  <!-- EfficientNet-B4 badge -->
  <rect x="148" y="134" width="130" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="213" y="150" text-anchor="middle" font-size="11" fill="#f97316" font-weight="600">EfficientNet-B4</text>

  <!-- Accuracy badge -->
  <rect x="286" y="134" width="100" height="24" rx="6" fill="#14532d" stroke="#166534" stroke-width="1"/>
  <text x="336" y="150" text-anchor="middle" font-size="11" fill="#4ade80" font-weight="700">99.2% Accuracy</text>

  <!-- FastAPI badge -->
  <rect x="394" y="134" width="80" height="24" rx="6" fill="#0c4a6e" stroke="#0369a1" stroke-width="1"/>
  <text x="434" y="150" text-anchor="middle" font-size="11" fill="#38bdf8" font-weight="600">FastAPI</text>

  <!-- Grad-CAM badge -->
  <rect x="482" y="134" width="80" height="24" rx="6" fill="#2e1065" stroke="#4c1d95" stroke-width="1"/>
  <text x="522" y="150" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">Grad-CAM</text>

  <!-- Stats on right -->
  <rect x="640" y="30" width="220" height="140" rx="10" fill="#111827" stroke="#1f2d4a" stroke-width="1"/>

  <text x="750" y="58" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600" letter-spacing="0.1em">MODEL STATS</text>
  <line x1="655" y1="65" x2="845" y2="65" stroke="#1f2d4a" stroke-width="1"/>

  <text x="660" y="87" font-size="11" fill="#94a3b8">Parameters</text>
  <text x="840" y="87" text-anchor="end" font-size="11" fill="#f97316" font-weight="700" font-family="monospace">19.3M</text>

  <text x="660" y="107" font-size="11" fill="#94a3b8">Input Size</text>
  <text x="840" y="107" text-anchor="end" font-size="11" fill="#38bdf8" font-weight="700" font-family="monospace">380×380</text>

  <text x="660" y="127" font-size="11" fill="#94a3b8">GPU Inference</text>
  <text x="840" y="127" text-anchor="end" font-size="11" fill="#4ade80" font-weight="700" font-family="monospace">~8ms</text>

  <text x="660" y="147" font-size="11" fill="#94a3b8">Training Data</text>
  <text x="840" y="147" text-anchor="end" font-size="11" fill="#a78bfa" font-weight="700" font-family="monospace">25,000 imgs</text>

  <text x="660" y="167" font-size="11" fill="#94a3b8">Framework</text>
  <text x="840" y="167" text-anchor="end" font-size="11" fill="#fb923c" font-weight="700" font-family="monospace">PyTorch 2.0</text>
</svg>
